<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7</title>
</head>
<body>
    <form>
        <fieldset>
            <h3>Formulario</h3>
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Juan" name="nombre" required> <br>
            <label>Email</label>
            <input type="email" id="email" placeholder="yoyo@gmail.com" name="email" required> <br>
            <label>Edad</label>
            <input type="number" id="edad" placeholder="18" name="edad"> <br>
            <label>Comentario</label>
            <textarea name="comentario" id="comentario"></textarea> <br> 
            <button type="submit">Enviar</button>

        </fieldset>
    </form>
</body>
</html>
